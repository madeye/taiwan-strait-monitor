name: Scrape and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python -m scraper.main

      - name: Check for new data
        id: check
        run: |
          if [ -f scraper_result.txt ] && [ "$(cat scraper_result.txt)" = "new" ]; then
            echo "has_new_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit data
        if: steps.check.outputs.has_new_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: $(date -u +%Y-%m-%d) PLA activity update"
          git push

      - name: Build site
        if: steps.check.outputs.has_new_data == 'true'
        run: make build

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.has_new_data == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
